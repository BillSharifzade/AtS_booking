# AtS client Telegram Mini Web App (#13) — served under the /ats/ subpath of the
# EXISTING dchr.koinotinav.com site (which already hosts another project).
#
# Paste the three blocks below INSIDE that domain's existing `server { ... }`
# (the HTTPS/443 one with the TLS cert). Do NOT add a new server block and do NOT
# touch the certificate — we are just adding routes to the site that already exists.
#
# Layout (same origin, so no CORS):
#   https://dchr.koinotinav.com/ats/        -> built mini app (static files)
#   https://dchr.koinotinav.com/ats/api/    -> FastAPI backend (api container on :8000)
#
# After editing: `sudo nginx -t && sudo systemctl reload nginx`

# 1) Backend API. Longest-prefix match wins, so this is chosen over /ats/ below.
#    The trailing slash on proxy_pass strips the /ats/api/ prefix:
#    /ats/api/client/bootstrap -> http://127.0.0.1:8000/client/bootstrap
location /ats/api/ {
    proxy_pass         http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    client_max_body_size 10m;   # headroom for any uploads
}

# 2) The mini app's static bundle. `alias` maps /ats/ -> the dist directory.
#    try_files falls back to index.html so deep links still load the SPA.
location /ats/ {
    alias /var/www/dchr-ats/;
    try_files $uri $uri/ /ats/index.html;
}

# 3) Make the bare path work: /ats -> /ats/ (the bundle uses relative asset URLs,
#    which only resolve correctly when the trailing slash is present).
location = /ats {
    return 301 /ats/;
}
