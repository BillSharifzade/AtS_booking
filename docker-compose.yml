services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Bind to loopback only — DB reachable for local tooling, not the network.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./server
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      SAT_BOOKINGS_GROUP_CHAT_ID: ${SAT_BOOKINGS_GROUP_CHAT_ID}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS}
      LOGIN_CODE_TTL_SECONDS: ${LOGIN_CODE_TTL_SECONDS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app

  bot:
    build: ./server
    command: python -m app.bot.main
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      SAT_BOOKINGS_GROUP_CHAT_ID: ${SAT_BOOKINGS_GROUP_CHAT_ID}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS}
      LOGIN_CODE_TTL_SECONDS: ${LOGIN_CODE_TTL_SECONDS}
      MINIAPP_URL: ${MINIAPP_URL:-}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./server:/app

  web:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Client Telegram Mini Web App (#13). Dev server for local work. In production
  # it is NOT run as a container — the existing host Nginx (serving
  # dchr.koinotinav.com for another project) serves the built ./miniapp/dist under
  # the /ats/ subpath and proxies /ats/api/ to the api service. Build with:
  #   docker compose run --rm miniapp npm run build
  # See deploy/nginx-ats.conf for the location blocks to add to that Nginx site.
  miniapp:
    build: ./miniapp
    command: npm run dev -- --host 0.0.0.0 --port 5174
    environment:
      VITE_API_BASE_URL: ${MINIAPP_API_BASE_URL:-${VITE_API_BASE_URL}}
    ports:
      - "5174:5174"
    volumes:
      - ./miniapp:/app
      - /app/node_modules

volumes:
  db_data:
