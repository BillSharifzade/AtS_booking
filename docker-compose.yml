services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Bind to loopback only — DB reachable for local tooling, not the network.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./server
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      SAT_BOOKINGS_GROUP_CHAT_ID: ${SAT_BOOKINGS_GROUP_CHAT_ID}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS}
      LOGIN_CODE_TTL_SECONDS: ${LOGIN_CODE_TTL_SECONDS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Dushanbe}
      TZ: ${APP_TIMEZONE:-Asia/Dushanbe}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app

  bot:
    build: ./server
    command: python -m app.bot.main
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      SAT_BOOKINGS_GROUP_CHAT_ID: ${SAT_BOOKINGS_GROUP_CHAT_ID}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS}
      LOGIN_CODE_TTL_SECONDS: ${LOGIN_CODE_TTL_SECONDS}
      MINIAPP_URL: ${MINIAPP_URL:-}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Dushanbe}
      TZ: ${APP_TIMEZONE:-Asia/Dushanbe}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./server:/app

  web:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Client Telegram Mini Web App (#13). In production this serves the static BUILD
  # (relative base "./") via `vite preview` on :5174; the recruitment project's
  # Caddy (the edge for dchr.koinotinav.com) proxies /ats/* here and /ats/api/* to
  # the api service. Serving the build (not the dev server) is required because the
  # Vite dev server emits root-absolute module URLs that break under the /ats/
  # subpath. See deploy/caddy-ats.md for the Caddyfile blocks to add to that edge.
  miniapp:
    build: ./miniapp
    command: sh -c "npm run build && npx vite preview --host 0.0.0.0 --port 5174 --strictPort"
    environment:
      VITE_API_BASE_URL: ${MINIAPP_API_BASE_URL:-${VITE_API_BASE_URL}}
    ports:
      - "5174:5174"
    volumes:
      - ./miniapp:/app
      - /app/node_modules

  # Admin panel served under the /ats_admin subpath of dchr.koinotinav.com (behind the
  # recruitment project's Caddy edge). Like the mini app, this serves the production
  # BUILD via `vite preview` (the dev server emits root-absolute module URLs that break
  # under a subpath). APP_BASE sets the Vite base (and the router basename); the app's
  # API calls go to /ats_admin/api which Caddy proxies to the api service.
  # The existing `web` dev server on :5173 (LAN access, base "/") is left untouched.
  webadmin:
    build: ./frontend
    command: sh -c "npm run build && npx vite preview --host 0.0.0.0 --port 5273 --strictPort"
    environment:
      APP_BASE: /ats_admin/
      VITE_API_BASE_URL: /ats_admin/api
    ports:
      - "5273:5273"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
